<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Ágil MEI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; min-height: 100vh; }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header h1 { color: #fff; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .header span { font-size: 28px; }
        .header-sub { color: #a0aec0; font-size: 13px; margin-top: 2px; }

        .container { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            border-left: 4px solid #0f3460;
        }
        .stat-card.alerta { border-left-color: #e53e3e; }
        .stat-card.ok { border-left-color: #38a169; }
        .stat-label { font-size: 12px; color: #718096; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 32px; font-weight: 700; color: #1a202c; margin-top: 4px; }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 24px;
            overflow: hidden;
        }
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f2f5;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-header h2 { font-size: 16px; font-weight: 600; color: #1a202c; }
        .card-header span { font-size: 20px; }

        table { width: 100%; border-collapse: collapse; }
        thead tr { background: #f7fafc; }
        th { padding: 12px 20px; text-align: left; font-size: 12px; font-weight: 600; color: #718096; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 14px 20px; font-size: 14px; color: #2d3748; border-bottom: 1px solid #f0f2f5; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f7fafc; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge.ok { background: #f0fff4; color: #276749; }
        .badge.repor { background: #fff5f5; color: #c53030; }

        .empty-state { padding: 48px; text-align: center; color: #a0aec0; }
        .empty-state p { margin-top: 8px; font-size: 14px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 24px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full { grid-column: span 2; }
        label { font-size: 13px; font-weight: 600; color: #4a5568; }
        input {
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus { border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,0.1); }
        input[readonly] { background: #f7fafc; color: #718096; }

        .divider { grid-column: span 2; border: none; border-top: 1px solid #f0f2f5; margin: 4px 0; }
        .section-label { grid-column: span 2; font-size: 12px; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: 0.5px; }

        .cep-row { display: flex; gap: 8px; }
        .cep-row input { flex: 1; }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 14px;
            margin: 0 24px 24px;
            width: calc(100% - 48px);
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #edf2f7; color: #4a5568; }
        .btn-secondary:hover { background: #e2e8f0; }
    </style>
</head>
<body>

<div class="header">
    <span>📦</span>
    <div>
        <h1>Estoque Ágil MEI</h1>
        <div class="header-sub">Controle de insumos e fornecedores</div>
    </div>
</div>

<div class="container">

    <!-- CARDS DE ESTATÍSTICAS -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total de Produtos</div>
            <div class="stat-value" th:text="${produtos.size()}">0</div>
        </div>
        <div class="stat-card ok">
            <div class="stat-label">Estoque OK</div>
            <div class="stat-value" th:text="${produtos.stream().filter(p -> !p.estoqueBaixo).count()}">0</div>
        </div>
        <div class="stat-card alerta">
            <div class="stat-label">Repor Estoque</div>
            <div class="stat-value" th:text="${produtos.stream().filter(p -> p.estoqueBaixo).count()}">0</div>
        </div>
    </div>

    <!-- TABELA DE PRODUTOS -->
    <div class="card">
        <div class="card-header">
            <span>🗂️</span>
            <h2>Produtos em Estoque</h2>
        </div>
        <div th:if="${#lists.isEmpty(produtos)}" class="empty-state">
            <div style="font-size:40px">📭</div>
            <p>Nenhum produto cadastrado ainda.</p>
        </div>
        <table th:unless="${#lists.isEmpty(produtos)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Produto</th>
                    <th>Qtd Atual</th>
                    <th>Mínimo</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${produtos}">
                    <td th:text="${p.id}" style="color:#a0aec0; font-size:13px;">#1</td>
                    <td style="font-weight:500;" th:text="${p.nome}">Produto</td>
                    <td th:text="${p.quantidadeAtual}">0</td>
                    <td th:text="${p.quantidadeMinima}">0</td>
                    <td>
                        <span th:if="${p.estoqueBaixo}" class="badge repor">⚠️ REPOR</span>
                        <span th:unless="${p.estoqueBaixo}" class="badge ok">✅ OK</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- FORMULÁRIO -->
    <div class="card">
        <div class="card-header">
            <span>➕</span>
            <h2>Adicionar Produto</h2>
        </div>
        <form th:action="@{/adicionar}" method="post">
            <div class="form-grid">
                <div class="form-group full">
                    <label>Nome do Produto</label>
                    <input type="text" name="nome" required placeholder="Ex: Farinha de trigo"/>
                </div>
                <div class="form-group">
                    <label>Quantidade Atual</label>
                    <input type="number" name="quantidadeAtual" required min="0" placeholder="0"/>
                </div>
                <div class="form-group">
                    <label>Quantidade Mínima</label>
                    <input type="number" name="quantidadeMinima" required min="0" placeholder="0"/>
                </div>

                <hr class="divider"/>
                <div class="section-label">Dados do Fornecedor</div>

                <div class="form-group full">
                    <label>CEP</label>
                    <div class="cep-row">
                        <input type="text" id="cep" name="cep" placeholder="Ex: 01310100" maxlength="8"/>
                        <button type="button" class="btn btn-secondary" onclick="buscarCep()">🔍 Buscar</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Rua</label>
                    <input type="text" id="rua" name="rua" readonly placeholder="Preenchido automaticamente"/>
                </div>
                <div class="form-group">
                    <label>Bairro</label>
                    <input type="text" id="bairro" name="bairro" readonly placeholder="Preenchido automaticamente"/>
                </div>
                <div class="form-group full">
                    <label>Cidade</label>
                    <input type="text" id="cidade" name="cidade" readonly placeholder="Preenchido automaticamente"/>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Cadastrar Produto</button>
        </form>
    </div>

</div>

<script>
    async function buscarCep() {
        const cep = document.getElementById('cep').value.trim();
        if (cep.length !== 8) { alert('Informe um CEP válido com 8 dígitos.'); return; }
        try {
            const resp = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await resp.json();
            if (data.erro) { alert('CEP não encontrado.'); return; }
            document.getElementById('rua').value = data.logradouro || '';
            document.getElementById('bairro').value = data.bairro || '';
            document.getElementById('cidade').value = data.localidade || '';
        } catch (e) { alert('Erro ao buscar CEP.'); }
    }
</script>

</body>
</html>
